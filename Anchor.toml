[toolchain]
anchor_version = "0.32.1"
solana_version = "2.2.0"

[features]
resolution = true
skip-lint = false

[workspace]
members = [
    "programs/pruv-registry",
    "programs/pruv-governance",
    "programs/pruv-node",
    "programs/pruv-attestation",
    "programs/pruv-lottery",
]

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[programs.localnet]
pruv_registry    = "Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS"
pruv_governance  = "GovPruv111111111111111111111111111111111111"
pruv_node        = "NodePruv11111111111111111111111111111111111"
pruv_attestation = "AttsPruv11111111111111111111111111111111111"
pruv_lottery     = "FLot1111111111111111111111111111111111111111"

[scripts]
test = "pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"